<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Crystal glass gradient — light top-left to dark bottom-right -->
    <linearGradient id="c1" x1="22%" y1="5%" x2="78%" y2="95%">
      <stop offset="0%"   stop-color="#eaeaff" stop-opacity="0.96"/>
      <stop offset="35%"  stop-color="#b0b0e0" stop-opacity="0.88"/>
      <stop offset="70%"  stop-color="#8080c0" stop-opacity="0.80"/>
      <stop offset="100%" stop-color="#5050a0" stop-opacity="0.72"/>
    </linearGradient>
    <!-- Main specular highlight (upper-left reflection) -->
    <radialGradient id="spec" cx="30%" cy="20%" r="40%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.92"/>
      <stop offset="50%"  stop-color="#ffffff" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <!-- Background purple ambient glow -->
    <radialGradient id="gbg" cx="50%" cy="44%" r="52%">
      <stop offset="0%"   stop-color="#7733cc" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <!-- Ground reflection -->
    <linearGradient id="ref" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%"   stop-color="#c8c8f8" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#c8c8f8" stop-opacity="0"/>
    </linearGradient>
    <!-- Glow filter for skull body -->
    <filter id="fg" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Black background -->
  <rect width="512" height="512" fill="#060606"/>

  <!-- Ambient purple glow behind skull -->
  <ellipse cx="256" cy="224" rx="210" ry="185" fill="url(#gbg)"/>

  <!-- ======= SKULL BODY ======= -->

  <!-- Cranium dome -->
  <path d="
    M256 72
    C182 72, 112 116, 106 192
    C100 246, 116 274, 130 302
    C146 332, 146 352, 156 368
    L356 368
    C366 352, 366 332, 382 302
    C396 274, 412 246, 406 192
    C400 116, 330 72, 256 72 Z
  " fill="url(#c1)" filter="url(#fg)"/>

  <!-- Cheekbone extensions (left) -->
  <path d="M118 248 C96 278, 94 316, 132 344 L166 344 C144 316, 140 284, 150 258 Z" fill="url(#c1)"/>

  <!-- Cheekbone extensions (right) -->
  <path d="M394 248 C416 278, 418 316, 380 344 L346 344 C368 316, 372 284, 362 258 Z" fill="url(#c1)"/>

  <!-- Jaw / mandible -->
  <path d="M156 364 L150 394 C149 420, 172 434, 256 434 C340 434, 363 420, 362 394 L356 364 Z" fill="url(#c1)"/>

  <!-- ======= FACIAL FEATURES ======= -->

  <!-- Teeth gaps -->
  <rect x="172" y="380" width="26" height="50" rx="6" fill="#050505"/>
  <rect x="204" y="380" width="26" height="50" rx="6" fill="#050505"/>
  <rect x="236" y="380" width="26" height="50" rx="6" fill="#050505"/>
  <rect x="268" y="380" width="26" height="50" rx="6" fill="#050505"/>
  <rect x="300" y="380" width="26" height="50" rx="6" fill="#050505"/>
  <rect x="332" y="380" width="18" height="50" rx="6" fill="#050505"/>

  <!-- Left eye socket (outer dark) -->
  <ellipse cx="194" cy="234" rx="48" ry="46" fill="#050505"/>
  <!-- Left eye socket (inner purple void) -->
  <ellipse cx="194" cy="234" rx="30" ry="28" fill="#160430"/>

  <!-- Right eye socket (outer dark) -->
  <ellipse cx="318" cy="234" rx="48" ry="46" fill="#050505"/>
  <!-- Right eye socket (inner purple void) -->
  <ellipse cx="318" cy="234" rx="30" ry="28" fill="#160430"/>

  <!-- Nasal cavity -->
  <path d="M238 280 Q256 304 274 280 Q282 316 256 324 Q230 316 238 280 Z" fill="#050505"/>

  <!-- Zygomatic arch dividers -->
  <path d="M148 262 L168 262" stroke="#050505" stroke-width="4" fill="none"/>
  <path d="M344 262 L364 262" stroke="#050505" stroke-width="4" fill="none"/>

  <!-- ======= CRYSTAL HIGHLIGHTS ======= -->

  <!-- Primary specular (large upper-left) -->
  <ellipse cx="208" cy="148" rx="72" ry="46"
    fill="url(#spec)"
    transform="rotate(-20 208 148)"
    opacity="0.74"/>

  <!-- Secondary specular (small upper-right) -->
  <ellipse cx="322" cy="158" rx="30" ry="19"
    fill="#ffffff"
    opacity="0.18"
    transform="rotate(15 322 158)"/>

  <!-- Edge highlight (right rim) -->
  <path d="M 384 180 Q 412 220 400 268 Q 394 254 382 218 Q 372 190 384 180 Z"
    fill="#ffffff" opacity="0.11"/>

  <!-- Subtle chin gloss -->
  <ellipse cx="256" cy="396" rx="58" ry="16" fill="#ffffff" opacity="0.07"/>

  <!-- ======= GROUND REFLECTION ======= -->
  <ellipse cx="256" cy="450" rx="118" ry="11" fill="url(#ref)"/>
</svg>
